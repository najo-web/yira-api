services:

  db_core:
    image: postgres:16-alpine
    container_name: yira_db_core
    environment:
      POSTGRES_USER: yira_core
      POSTGRES_PASSWORD: yira_core_2026_gov
      POSTGRES_DB: yira_core
    ports:
      - '5431:5432'
    volumes:
      - db_core_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U yira_core -d yira_core']
      interval: 10s
      timeout: 5s
      retries: 5

  db_sync:
    image: postgres:16-alpine
    container_name: yira_db_sync
    environment:
      POSTGRES_USER: yira
      POSTGRES_PASSWORD: yira2026
      POSTGRES_DB: yira_sync
    ports:
      - '5432:5432'
    volumes:
      - db_sync_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U yira -d yira_sync']
      interval: 10s
      timeout: 5s
      retries: 5

  db_orientation:
    image: postgres:16-alpine
    container_name: yira_db_orientation
    environment:
      POSTGRES_USER: yira
      POSTGRES_PASSWORD: yira2026
      POSTGRES_DB: yira_orientation
    ports:
      - '5433:5432'
    volumes:
      - db_orientation_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U yira -d yira_orientation']
