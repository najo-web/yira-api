  redis:
    image: redis:7-alpine
    container_name: yira_redis
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  db_core_data:
  db_sync_data:
  db_orientation_data:
  db_game_data:
  db_etude_data:
  db_sos_data:
  db_cqci_data:
  redis_data: