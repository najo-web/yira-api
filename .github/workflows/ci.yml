# =============================================================================
# YIRA V3.0 — CI/CD Pipeline GitHub Actions
# Sprint 49 — Tests automatisés + build vérification
# =============================================================================
name: YIRA CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Tests + Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Run unit tests
        run: npm test -- --passWithNoTests --forceExit
        env:
          NODE_ENV: test

      - name: Build production
        run: npm run build

      - name: Tests passed
        run: echo "✅ YIRA V3.0 — Tests CI passés"