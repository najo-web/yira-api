name: YIRA CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Tests unitaires YIRA
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm test -- --passWithNoTests --forceExit
        env:
          NODE_ENV: test
          JWT_SECRET: test-secret-yira-ci
          GEMINI_API_KEY: test-key
          ANTHROPIC_API_KEY: test-key
          SIGMUND_CLIENT_ID: test-client
          SIGMUND_PRODUCT_CODE: '25'

      - name: Success
        run: echo "YIRA V3.0 — 36 tests passes"